name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $parts = $version.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $version = $parts -join '.'
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore CdsHelper/CdsHelper.csproj

      - name: Publish
        run: dotnet publish CdsHelper/CdsHelper.csproj -c Release -o publish --no-restore -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Download previous release for delta updates
        shell: pwsh
        run: vpk download github --repoUrl https://github.com/Kyeongrok/cds-helper --token ${{ secrets.GITHUB_TOKEN }} --outputDir releases
        continue-on-error: true

      - name: Pack with Velopack
        # --mainExe: Velopack이 Setup.exe bootstrapper를 만들려면 entry point exe를 명시해야 함.
        #   누락 시 Setup.exe 생성이 skip되고 nupkg/RELEASES만 만들어짐.
        # --packTitle / --packAuthors: 설치 UI와 시작 메뉴 등에 표시되는 이름.
        run: vpk pack --packId CdsHelper --packTitle "CdsHelper" --packAuthors "Kyeongrok" --packVersion ${{ steps.version.outputs.version }} --packDir publish --mainExe CdsHelper.exe --outputDir releases --icon CdsHelper/app.ico

      - name: Upload to GitHub Releases
        run: vpk upload github --repoUrl https://github.com/Kyeongrok/cds-helper --token ${{ secrets.GITHUB_TOKEN }} --tag ${{ github.ref_name }} --releaseName "${{ github.ref_name }}" --outputDir releases
