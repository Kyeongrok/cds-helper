name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CdsHelper/CdsHelper.csproj

      - name: Publish
        run: dotnet publish CdsHelper/CdsHelper.csproj -c Release -o publish --no-restore

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath cds-helper.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: cds-helper.zip
